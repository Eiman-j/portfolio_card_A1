<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Card</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>

   <body>
    <div class="page-wrapper">
      <article class="card">
        <img
          src="https://i.pinimg.com/1200x/6a/f8/f9/6af8f9cebc9d067af26682bb335efd99.jpg"
          alt="Project Preview"
          class="card-image"
        />
        <div class="card-body"> 
          <h3 class="card-title">Weather Dashboard App</h3>
          <p class="card-description">
            A real-time weather tracking dashboard that displays temperature,
            humidity, and forecasts for any city in the world using the
            OpenWeather API.
          </p>
          <ul class="tech-list"> 
            <li>HTML5</li>
            <li>CSS3</li>
            <li>JavaScript</li>
            <li>REST API</li>
          </ul>
          <div class="btn-container">
            <a href="#" class="btn">View Project</a>
          </div>
        </div>
      </article>
    </div>
  </body>
</html>
